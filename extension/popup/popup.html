<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AegisVault</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- WIDOK A: ZABLOKOWANY                            -->
  <!-- ═══════════════════════════════════════════════ -->
  <div id="view-locked" class="view">
    <div class="header">
      <div class="logo">AV</div>
      <div>
        <div class="app-name">AegisVault</div>
        <div class="app-sub">Menedżer haseł</div>
      </div>
    </div>

    <div class="form-section">
      <label class="field-label">Nazwa użytkownika</label>
      <input id="input-username" type="text" class="field-input"
             placeholder="Twój login" autocomplete="username" />

      <label class="field-label">Hasło główne</label>
      <div class="password-wrap">
        <input id="input-password" type="password" class="field-input"
               placeholder="Hasło główne" autocomplete="current-password" />
        <button id="btn-toggle-pw" class="btn-eye" title="Pokaż hasło" type="button">👁</button>
      </div>

      <!-- TOTP (ukryte domyślnie) -->
      <div id="totp-section" class="hidden">
        <label class="field-label">Kod 2FA (6 cyfr)</label>
        <input id="input-totp" type="text" class="field-input"
               placeholder="000000" maxlength="6" inputmode="numeric" />
      </div>

      <div id="error-msg" class="error-msg hidden"></div>

      <button id="btn-unlock" class="btn-primary" type="button">Odblokuj</button>
    </div>

    <div class="footer-hint">
      Uruchom aplikację AegisVault, aby zarządzać hasłami.
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- WIDOK B: ODBLOKOWANY — LISTA POŚWIADCZEŃ        -->
  <!-- ═══════════════════════════════════════════════ -->
  <div id="view-unlocked" class="view hidden">
    <div class="top-bar">
      <div class="top-bar-left">
        <div class="logo small">AV</div>
        <span id="lbl-username" class="user-label"></span>
      </div>
      <div class="top-bar-right">
        <span id="session-timer" class="session-timer" title="Czas do automatycznej blokady"></span>
        <button id="btn-lock" class="btn-icon" title="Zablokuj" type="button">🔒</button>
      </div>
    </div>

    <div class="search-wrap">
      <input id="input-search" type="search" class="field-input search-input"
             placeholder="Szukaj..." autocomplete="off" />
    </div>

    <div class="cred-list-wrap">
      <div id="cred-list" class="cred-list"></div>
      <div id="cred-empty" class="cred-empty hidden">Brak pasujących wpisów</div>
    </div>

    <div id="fill-bar" class="fill-bar hidden">
      <span id="fill-bar-text" class="fill-bar-text"></span>
      <button id="btn-fill-page" class="btn-fill" type="button">Uzupełnij stronę</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- WIDOK C: SZCZEGÓŁY POŚWIADCZENIA               -->
  <!-- ═══════════════════════════════════════════════ -->
  <div id="view-detail" class="view hidden">
    <div class="detail-header">
      <button id="btn-back" class="btn-back" type="button">← Wróć</button>
      <span id="detail-title" class="detail-title"></span>
    </div>

    <div class="detail-body">
      <div class="detail-row">
        <span class="detail-label">Login</span>
        <span id="detail-username" class="detail-value"></span>
        <button class="btn-copy" data-copy="username" title="Kopiuj">📋</button>
      </div>
      <div class="detail-row">
        <span class="detail-label">Hasło</span>
        <span id="detail-password" class="detail-value masked">••••••••</span>
        <button id="btn-reveal" class="btn-copy" title="Pokaż/ukryj">👁</button>
        <button class="btn-copy" data-copy="password" title="Kopiuj">📋</button>
      </div>
      <div class="detail-row" id="detail-url-row">
        <span class="detail-label">URL</span>
        <span id="detail-url" class="detail-value url-value"></span>
      </div>
      <div class="detail-row" id="detail-notes-row">
        <span class="detail-label">Notatki</span>
        <span id="detail-notes" class="detail-value notes-value"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Kategoria</span>
        <span id="detail-category" class="detail-value"></span>
      </div>
    </div>

    <div class="detail-actions">
      <button id="btn-fill-detail" class="btn-primary" type="button">Uzupełnij stronę</button>
    </div>
  </div>

  <!-- Spinner (globalny) -->
  <div id="spinner" class="spinner hidden">
    <div class="spinner-ring"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
