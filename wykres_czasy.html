<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wykres czasów odpowiedzi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #4f8ef7;
    --accent2: #38d9a9;
    --accent3: #ffa94d;
    --text: #e8eaf0;
    --muted: #6b7280;
    --bar-good: #4f8ef7;
    --bar-medium: #38d9a9;
    --bar-slow: #ffa94d;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .wrapper {
    width: 100%;
    max-width: 820px;
  }

  /* CHART CARD */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .chart-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }

  .chart-header {
    margin-bottom: 28px;
  }

  .chart-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .chart-subtitle {
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* BARS */
  .chart-area {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 200px 1fr 70px;
    align-items: center;
    gap: 14px;
  }

  .bar-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    height: 32px;
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    display: flex;
    align-items: center;
    min-width: 4px;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: rgba(255,255,255,0.1);
    border-radius: 6px 6px 0 0;
  }

  .bar-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-align: right;
  }

  /* AXIS */
  .x-axis {
    display: grid;
    grid-template-columns: 200px 1fr 70px;
    gap: 14px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .x-ticks {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  /* EDITOR */
  .editor-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
  }

  .editor-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .editor-title span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .field input {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(79,142,247,0.06);
    border: 1px solid rgba(79,142,247,0.15);
    border-radius: 10px;
    line-height: 1.6;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
  }

  /* PRINT */
  @media print {
    body { background: white; }
    .editor-card { display: none; }
    .chart-card { border: 1px solid #ddd; }
  }
</style>
</head>
<body>

<div class="wrapper">

  <div class="chart-card" id="chartCard">
    <div class="chart-header">
      <div class="chart-title">Rysunek 22. Czasy odpowiedzi aplikacji dla wybranych operacji</div>
      <div class="chart-subtitle">Środowisko testowe: Windows 11, AMD Ryzen 7 9800X3D, 64 GB RAM, Python 3.14</div>
    </div>

    <div class="chart-area" id="chartArea"></div>

    <div class="x-axis">
      <div></div>
      <div class="x-ticks" id="xTicks"></div>
      <div></div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4f8ef7"></div> Operacje lokalne</div>
      <div class="legend-item"><div class="legend-dot" style="background:#38d9a9"></div> Operacje sieciowe</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffa94d"></div> Operacje kryptograficzne</div>
    </div>
  </div>

  <div class="editor-card">
    <div class="editor-title"><span></span> Wpisz swoje zmierzone wartości [ms]</div>
    <div class="editor-grid" id="editorGrid"></div>
  </div>

</div>

<script>
const operations = [
  { label: "Dodanie hasła",        value: 85,  color: "#4f8ef7", type: "local" },
  { label: "Edycja hasła",         value: 78,  color: "#4f8ef7", type: "local" },
  { label: "Wyszukiwanie",         value: 42,  color: "#4f8ef7", type: "local" },
  { label: "Ładowanie listy",      value: 120, color: "#4f8ef7", type: "local" },
  { label: "Eksport backupu",      value: 195, color: "#ffa94d", type: "crypto" },
  { label: "Import backupu",       value: 210, color: "#ffa94d", type: "crypto" },
  { label: "Szyfrowanie (1 wpis)", value: 18,  color: "#ffa94d", type: "crypto" },
  { label: "Sync Push (10 wpisów)",value: 340, color: "#38d9a9", type: "network" },
  { label: "Sync Pull (10 wpisów)",value: 290, color: "#38d9a9", type: "network" },
];

let values = operations.map(o => o.value);

function getMax() {
  return Math.max(...values, 100);
}

function niceMax(v) {
  const step = v <= 200 ? 50 : v <= 500 ? 100 : 200;
  return Math.ceil(v / step) * step;
}

function renderChart() {
  const max = niceMax(getMax());
  const area = document.getElementById('chartArea');
  area.innerHTML = '';

  operations.forEach((op, i) => {
    const pct = Math.min((values[i] / max) * 100, 100);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label">${op.label}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%; background: linear-gradient(90deg, ${op.color}cc, ${op.color})"></div>
      </div>
      <div class="bar-value">${values[i]} ms</div>
    `;
    area.appendChild(row);
  });

  // X ticks
  const ticks = document.getElementById('xTicks');
  const steps = 5;
  ticks.innerHTML = '';
  for (let i = 0; i <= steps; i++) {
    const v = Math.round((max / steps) * i);
    const span = document.createElement('span');
    span.textContent = v + (i === steps ? ' ms' : '');
    ticks.appendChild(span);
  }
}

function renderEditor() {
  const grid = document.getElementById('editorGrid');
  grid.innerHTML = '';
  operations.forEach((op, i) => {
    const field = document.createElement('div');
    field.className = 'field';
    field.innerHTML = `
      <label>${op.label}</label>
      <input type="number" min="1" max="9999" value="${values[i]}" data-idx="${i}" placeholder="ms">
    `;
    grid.appendChild(field);
  });

  grid.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', e => {
      const idx = +e.target.dataset.idx;
      const v = parseInt(e.target.value) || 0;
      values[idx] = v;
      renderChart();
    });
  });
}

renderChart();
renderEditor();

// Animate bars on load
setTimeout(() => {
  document.querySelectorAll('.bar-fill').forEach((b, i) => {
    b.style.width = '0%';
    setTimeout(() => {
      const max = niceMax(getMax());
      const pct = Math.min((values[i] / max) * 100, 100);
      b.style.width = pct + '%';
    }, 50 + i * 60);
  });
}, 100);
</script>
</body>
</html>
