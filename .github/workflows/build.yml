name: Build & Package AegisVault

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Budowanie binarek PyInstaller (3 platformy)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: pyinstaller-windows
          - os: macos-latest
            artifact: pyinstaller-macos
          - os: ubuntu-latest
            artifact: pyinstaller-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free disk space (macOS)
        if: runner.os == 'macOS'
        run: |
          brew cleanup --prune=all || true
          rm -rf ~/Library/Caches/Homebrew || true
          sudo rm -rf /Library/Developer/CommandLineTools || true
          sudo rm -rf /Applications/Xcode.app || true
          sudo rm -rf /Library/Developer/CoreSimulator || true
          sudo rm -rf /opt/homebrew/share/doc || true
          df -h

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-xkb1 libxkbcommon-x11-0 \
            libx11-xcb1 libglib2.0-0 libfontconfig1 libdbus-1-3 \
            libegl1 libgl1 libxcb1 libxcb-cursor0 xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller aegisvault.spec --noconfirm

      - name: Strip unused Qt frameworks (macOS)
        if: runner.os == 'macOS'
        run: |
          APP="dist/AegisVault.app"
          # PyInstaller umieszcza frameworki w dwóch miejscach — sprawdzamy oba
          for FW in \
            "${APP}/Contents/Frameworks" \
            "${APP}/Contents/Frameworks/PyQt6/Qt6/lib"; do
            [ -d "$FW" ] || continue
            for name in QtNfc QtBluetooth \
                        QtWebEngine QtWebEngineCore QtWebEngineWidgets QtWebEngineQuick \
                        QtMultimedia QtMultimediaWidgets QtMultimediaQuick \
                        QtLocation QtPositioning QtPositioningQuick \
                        QtSensors QtSensorsQuick \
                        QtSerialPort QtSerialBus \
                        QtCharts QtDataVisualization \
                        Qt3DCore Qt3DRender Qt3DInput Qt3DLogic Qt3DAnimation Qt3DExtras Qt3DQuick \
                        QtVirtualKeyboard \
                        QtQuick QtQuickWidgets QtQuickControls2 QtQuickTemplates2 \
                        QtQml QtQmlModels QtQmlWorkerScript \
                        QtPdf QtPdfQuick QtPdfWidgets \
                        QtRemoteObjects QtScxml QtStateMachine \
                        QtNetworkAuth QtSql QtTest QtXml QtDBus; do
              fw_path="${FW}/${name}.framework"
              [ -d "$fw_path" ] && echo "Removing ${FW}/${name}" && rm -rf "$fw_path" || true
            done
          done
          echo "App size after strip: $(du -sh dist/AegisVault.app | cut -f1)"

      - name: Ad-hoc code sign (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - "dist/AegisVault.app" || true
          xattr -cr "dist/AegisVault.app" || true

      - name: Upload PyInstaller artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/AegisVault/

      - name: Upload PyInstaller artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/AegisVault.app/

      - name: Upload PyInstaller artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/aegisvault

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Instalator Windows (Inno Setup → .exe)
  # ─────────────────────────────────────────────────────────────
  package-windows:
    name: Package Windows Installer
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download PyInstaller artifact
        uses: actions/download-artifact@v4
        with:
          name: pyinstaller-windows
          path: dist/AegisVault/

      - name: Get version from version.py
        id: version
        shell: pwsh
        run: |
          $v = (python -c "from version import APP_VERSION; print(APP_VERSION)")
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: pwsh

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\iscc.exe"
          & $iscc /DAppVersion=${{ steps.version.outputs.version }} installer\windows\aegisvault.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/AegisVault-Setup-*.exe

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Pakiet Linux (.deb)
  # ─────────────────────────────────────────────────────────────
  package-linux:
    name: Package Linux .deb
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download PyInstaller artifact
        uses: actions/download-artifact@v4
        with:
          name: pyinstaller-linux
          path: dist/

      - name: Fix permissions
        run: chmod +x dist/aegisvault

      - name: Install fakeroot
        run: sudo apt-get install -y fakeroot

      - name: Build .deb
        run: bash installer/linux/build_deb.sh

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: dist/aegisvault_*.deb

  # ─────────────────────────────────────────────────────────────
  # JOB 6: GitHub Release (tylko dla tagów v*)
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [package-windows, package-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer-windows/AegisVault-Setup-*.exe
            installer-linux/aegisvault_*.deb
          generate_release_notes: true
          body: |
            ## AegisVault ${{ github.ref_name }}

            ### Pliki do pobrania

            | System | Plik | Opis |
            |--------|------|------|
            | Windows | `AegisVault-Setup-*.exe` | Instalator (Inno Setup) |
            | Linux | `aegisvault_*.deb` | Pakiet Debian/Ubuntu |

            ### Pierwsze uruchomienie
            Szczegółowa instrukcja instalacji: [INSTALLATION.md](https://github.com/${{ github.repository }}/blob/main/docs/INSTALLATION.md)
