# nginx.conf — Reverse proxy dla AegisVault Sync Server
# Obsługuje HTTPS, rate limiting i nagłówki bezpieczeństwa

# Rate limiting: max 10 żądań/s per IP (ochrona /login i /register)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/m;

server {
    listen 80;
    server_name ${DOMAIN};

    # ACME challenge dla Let's Encrypt (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Przekieruj resztę na HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ${DOMAIN};

    # ── Certyfikaty SSL (Let's Encrypt) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # ── Silna konfiguracja TLS ───────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Nagłówki bezpieczeństwa ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Kompresja ────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # ── Proxy do FastAPI ─────────────────────────────────────────
    location / {
        proxy_pass http://aegisvault-server:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Rate limit ogólny
        limit_req zone=api_limit burst=20 nodelay;
    }

    # ── Rate limiting dla endpointów auth ───────────────────────
    location ~ ^/(login|register)$ {
        proxy_pass http://aegisvault-server:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Surowy limit dla logowania (3 próby/min per IP)
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
    }

    # ── Zablokuj dostęp do plików systemowych ───────────────────
    location ~ /\. {
        deny all;
    }
}
